<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiergewichte - Gewichtsverfolgung</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #ffffff;
            --input-bg: #2d2d2d;
            --border-color: #404040;
            --accent-color: #4CAF50;
            --accent-hover: #45a049;
            --error-color: #f44336;
            --warning-color: #ff9800;
            --info-color: #2196F3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background-color: var(--input-bg);
            border-radius: 5px;
        }

        header h1 {
            font-size: 24px;
            margin: 0;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .sync-status {
            font-size: 12px;
            padding: 5px 10px;
            background-color: var(--warning-color);
            border-radius: 3px;
            color: black;
            font-weight: bold;
        }

        .sync-status.synced {
            background-color: var(--accent-color);
            color: white;
        }

        nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        nav button {
            padding: 10px 20px;
            background-color: transparent;
            color: var(--text-color);
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        nav button:hover {
            background-color: var(--input-bg);
            border-bottom-color: var(--accent-color);
        }

        nav button.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--text-color);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px var(--accent-color);
        }

        button {
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.secondary {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        button.secondary:hover {
            background-color: var(--border-color);
        }

        button.danger {
            background-color: var(--error-color);
        }

        button.danger:hover {
            background-color: #da190b;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: var(--input-bg);
            border-radius: 3px;
            overflow: hidden;
        }

        table thead {
            background-color: var(--border-color);
        }

        table th {
            padding: 10px;
            text-align: left;
            font-weight: bold;
            color: var(--text-color);
        }

        table td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        table tbody tr:hover {
            background-color: var(--border-color);
        }

        table tbody tr:last-child td {
            border-bottom: none;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background-color: var(--input-bg);
            margin: 10% auto;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .close {
            color: var(--text-color);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: var(--accent-color);
        }

        .alert {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 3px;
            font-weight: bold;
        }

        .alert-info {
            background-color: var(--info-color);
            color: white;
        }

        .alert-warning {
            background-color: var(--warning-color);
            color: black;
        }

        .alert-error {
            background-color: var(--error-color);
            color: white;
        }

        .alert-success {
            background-color: var(--accent-color);
            color: white;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .settings-section {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }

        .settings-section h3 {
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .hit-status {
            font-size: 12px;
            margin-top: 4px;
            min-height: 18px;
            color: #aaa;
        }

        .hit-status.loading { color: var(--warning-color); }
        .hit-status.found   { color: var(--accent-color); }
        .hit-status.notfound{ color: var(--error-color); }

        @media (max-width: 768px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 10px;
            }

            .header-right {
                flex-direction: column;
                width: 100%;
            }

            .modal-content {
                width: 95%;
                margin: 20% auto;
            }

            nav {
                flex-wrap: wrap;
            }

            table {
                font-size: 12px;
            }

            table th,
            table td {
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tiergewichte</h1>
            <div class="header-right">
                <div class="sync-status" id="syncStatus">Bereit</div>
                <button class="secondary" id="settingsBtn">&#9881;&#65039; Einstellungen</button>
            </div>
        </header>

        <nav>
            <button class="nav-btn active" data-tab="entry">Eintrag</button>
            <button class="nav-btn" data-tab="weighing">Wägen</button>
            <button class="nav-btn" data-tab="group">Gruppengewicht</button>
            <button class="nav-btn" data-tab="inventory">Bestand</button>
        </nav>

        <!-- Entry Tab -->
        <div id="entry" class="tab-content active">
            <h2>Neues Tier erfassen</h2>
            <div class="form-group">
                <label for="earTag">Ohrmarke:</label>
                <input type="text" id="earTag" placeholder="z.B. 123456">
                <div id="hitStatus" class="hit-status"></div>
            </div>
            <div class="form-group">
                <label for="breed">Rasse:</label>
                <select id="breed"></select>
            </div>
            <div class="form-group">
                <label for="gender">Geschlecht:</label>
                <select id="gender">
                    <option value="">-- Wählen --</option>
                    <option value="m">Männlich</option>
                    <option value="f">Weiblich</option>
                </select>
            </div>
            <div class="form-group">
                <label for="entryWeight">Eingangsgewicht (kg):</label>
                <input type="number" id="entryWeight" step="0.1" placeholder="z.B. 25.5">
            </div>
            <div class="button-group">
                <button id="addAnimalBtn">Tier hinzufügen</button>
                <button class="secondary" id="viewEnteredAnimalsBtn">Erfasste Tiere anzeigen</button>
            </div>
        </div>

        <!-- Weighing Tab -->
        <div id="weighing" class="tab-content">
            <h2>Wägen</h2>
            <div class="form-group">
                <label for="animalSelect">Tier wählen:</label>
                <select id="animalSelect"></select>
            </div>
            <div class="form-group">
                <label for="weighDate">Datum:</label>
                <input type="date" id="weighDate">
            </div>
            <div class="form-group">
                <label for="weighEvent">Ereignis:</label>
                <select id="weighEvent">
                    <option value="">-- Wählen --</option>
                    <option value="Einstallung">Einstallung</option>
                    <option value="Regulär">Regulär</option>
                    <option value="Verkauf">Verkauf</option>
                </select>
            </div>
            <div class="form-group">
                <label for="weight">Gewicht (kg):</label>
                <input type="number" id="weight" step="0.1" placeholder="z.B. 35.2">
            </div>
            <button id="recordWeightBtn">Gewicht erfassen</button>
        </div>

        <!-- Group Weighing Tab -->
        <div id="group" class="tab-content">
            <h2>Gruppengewicht</h2>
            <p>Geben Sie das Gesamtgewicht mehrerer Tiere ein. Das Gewicht wird pro Tier verteilt.</p>
            <div class="form-group">
                <label for="groupAnimals">Tiere (kommagetrennte Ohrmarken):</label>
                <textarea id="groupAnimals" placeholder="z.B. 123,124,125"></textarea>
            </div>
            <div class="form-group">
                <label for="groupWeight">Gesamtgewicht (kg):</label>
                <input type="number" id="groupWeight" step="0.1" placeholder="z.B. 105.0">
            </div>
            <div class="form-group">
                <label for="groupDate">Datum:</label>
                <input type="date" id="groupDate">
            </div>
            <button id="recordGroupWeightBtn">Gruppengewicht erfassen</button>
        </div>

        <!-- Inventory Tab -->
        <div id="inventory" class="tab-content">
            <h2>Bestand</h2>
            <button id="loadInventoryBtn">Bestand laden</button>
            <div id="inventoryTable"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeSettings">&times;</span>
            <div class="modal-header">Einstellungen</div>
            <div class="settings-grid">
                <div class="settings-section">
                    <h3>Google Sheets</h3>
                    <div class="form-group">
                        <label for="sheetUrl">Sheet URL:</label>
                        <input type="text" id="sheetUrl" placeholder="Google Sheet URL">
                    </div>
                    <button id="saveSheetBtn">Speichern</button>
                </div>
                <div class="settings-section">
                    <h3>Google Apps Script</h3>
                    <div class="form-group">
                        <label for="appsScriptUrl">Apps Script URL:</label>
                        <input type="text" id="appsScriptUrl" placeholder="Apps Script Deployment URL">
                    </div>
                    <button id="saveAppsScriptBtn">Speichern</button>
                </div>
            </div>
            <div class="settings-section">
                <h3>Rassen-Verwaltung</h3>
                <div class="form-group">
                    <label for="breedInput">Neue Rasse:</label>
                    <input type="text" id="breedInput" placeholder="z.B. Angeln Rind">
                </div>
                <button id="addBreedBtn">Rasse hinzufügen</button>
                <div id="breedList"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize app
        let animals = [];
        let weights = [];
        let breeds = ['Angeln Rind', 'Deutsch-Holländer', 'Fleckvieh', 'Limousin', 'Charolais'];
        const STORAGE_KEY = 'tiergewichte_data';
        const BREEDS_KEY = 'tiergewichte_breeds';
        const SETTINGS_KEY = 'tiergewichte_settings';
        let sheetUrl = '';
        let appsScriptUrl = '';

        // Load data from localStorage
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const data = JSON.parse(stored);
                animals = data.animals || [];
                weights = data.weights || [];
            }

            // Load breeds
            const storedBreeds = localStorage.getItem(BREEDS_KEY);
            if (storedBreeds) {
                breeds = JSON.parse(storedBreeds);
            }

            // Load settings
            const settings = localStorage.getItem(SETTINGS_KEY);
            if (settings) {
                const parsedSettings = JSON.parse(settings);
                sheetUrl = parsedSettings.sheetUrl || '';
                appsScriptUrl = parsedSettings.appsScriptUrl || '';
            }
        }

        // Save data to localStorage
        function saveData() {
            const data = {
                animals: animals,
                weights: weights
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateSyncStatus();
        }

        // Save settings
        function saveSettings() {
            const settings = {
                sheetUrl: sheetUrl,
                appsScriptUrl: appsScriptUrl
            };
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        }

        // Update sync status
        function updateSyncStatus() {
            const syncStatus = document.getElementById('syncStatus');
            const unsyncedCount = animals.filter(a => !a.synced).length;
            if (unsyncedCount > 0) {
                syncStatus.textContent = `${unsyncedCount} unsynced`;
                syncStatus.classList.remove('synced');
            } else {
                syncStatus.textContent = 'Synced';
                syncStatus.classList.add('synced');
            }
        }

        // Initialize breeds dropdown
        function initBreeds() {
            const breedSelect = document.getElementById('breed');
            breedSelect.innerHTML = '<option value="">-- Wählen --</option>';
            breeds.forEach(breed => {
                const option = document.createElement('option');
                option.value = breed;
                option.textContent = breed;
                breedSelect.appendChild(option);
            });
            updateBreedList();
        }

        // Add a breed
        function addBreed() {
            const input = document.getElementById('breedInput');
            const newBreed = input.value.trim();
            if (newBreed && !breeds.includes(newBreed)) {
                breeds.push(newBreed);
                localStorage.setItem(BREEDS_KEY, JSON.stringify(breeds));
                initBreeds();
                input.value = '';
                alert('Rasse hinzugefügt!');
            } else if (breeds.includes(newBreed)) {
                alert('Diese Rasse existiert bereits!');
            }
        }

        // Update breed list display
        function updateBreedList() {
            const breedListDiv = document.getElementById('breedList');
            breedListDiv.innerHTML = '<strong>Verfügbare Rassen:</strong><br>';
            breeds.forEach((breed, index) => {
                const breedItem = document.createElement('div');
                breedItem.style.marginBottom = '5px';
                breedItem.innerHTML = `${breed} <button class="danger" onclick="deleteBreed(${index})" style="padding: 2px 8px; font-size: 12px;">Löschen</button>`;
                breedListDiv.appendChild(breedItem);
            });
        }

        // Delete a breed
        function deleteBreed(index) {
            breeds.splice(index, 1);
            localStorage.setItem(BREEDS_KEY, JSON.stringify(breeds));
            initBreeds();
        }

        // Map HI-TIER Geschlecht value to "m" or "f"
        function mapGeschlecht(geschlecht) {
            if (!geschlecht) return '';
            const g = geschlecht.trim().toLowerCase();
            if (g === 'm' || g === 'männlich' || g.startsWith('männ') || g === 'male' || g === 'kastrat' || g.startsWith('kastri')) return 'm';
            if (g === 'w' || g === 'f' || g === 'weiblich' || g.startsWith('weibl') || g === 'female') return 'f';
            return '';
        }

        // HI-TIER lookup by Ohrmarke — fills Rasse and Geschlecht automatically
        async function hitLookupByEarTag() {
            if (!appsScriptUrl) return;
            const earTag = document.getElementById('earTag').value.trim();
            if (!earTag) return;

            const statusEl = document.getElementById('hitStatus');
            statusEl.textContent = 'Lade von HIT...';
            statusEl.className = 'hit-status loading';

            try {
                const url = appsScriptUrl + '?action=getTier&ohrmarke=' + encodeURIComponent(earTag);
                const res = await fetch(url);
                const tier = await res.json();

                if (tier.error || !tier.lom) {
                    statusEl.textContent = 'Nicht in HIT gefunden';
                    statusEl.className = 'hit-status notfound';
                    return;
                }

                // Fill Geschlecht
                const mappedGender = mapGeschlecht(tier.geschlecht);
                if (mappedGender) {
                    document.getElementById('gender').value = mappedGender;
                }

                // Fill Rasse: try exact match first, then partial, then add to list
                if (tier.rasse) {
                    const breedSelect = document.getElementById('breed');
                    const rasseHIT = tier.rasse.trim();
                    let matched = breeds.find(b => b.toLowerCase() === rasseHIT.toLowerCase());
                    if (!matched) {
                        matched = breeds.find(b => b.toLowerCase().includes(rasseHIT.toLowerCase())
                                                || rasseHIT.toLowerCase().includes(b.toLowerCase()));
                    }
                    if (matched) {
                        breedSelect.value = matched;
                    } else {
                        // Add new breed from HIT and select it
                        breeds.push(rasseHIT);
                        localStorage.setItem(BREEDS_KEY, JSON.stringify(breeds));
                        initBreeds();
                        breedSelect.value = rasseHIT;
                    }
                }

                const parts = [];
                if (tier.rasse) parts.push(tier.rasse);
                if (tier.geschlecht) parts.push(tier.geschlecht);
                if (tier.geburtsdatum) parts.push('geb. ' + tier.geburtsdatum);
                statusEl.textContent = 'HIT: ' + (parts.join(' · ') || tier.lom);
                statusEl.className = 'hit-status found';

            } catch (err) {
                statusEl.textContent = 'HIT-Fehler: ' + err.message;
                statusEl.className = 'hit-status notfound';
            }
        }

        // Add an animal
        function addAnimal() {
            const earTag = document.getElementById('earTag').value.trim();
            const breed = document.getElementById('breed').value;
            const gender = document.getElementById('gender').value;
            const entryWeight = parseFloat(document.getElementById('entryWeight').value);

            if (!earTag || !breed || !gender || isNaN(entryWeight)) {
                alert('Bitte füllen Sie alle Felder aus!');
                return;
            }

            // Check if animal with this ear tag already exists
            if (animals.some(a => a.earTag === earTag)) {
                alert('Tier mit dieser Ohrmarke existiert bereits!');
                return;
            }

            const animal = {
                id: Date.now(),
                earTag: earTag,
                breed: breed,
                gender: gender,
                entryWeight: entryWeight,
                entryDate: new Date().toISOString(),
                synced: false
            };

            animals.push(animal);
            saveData();
            alert('Tier hinzugefügt!');
            document.getElementById('earTag').value = '';
            document.getElementById('breed').value = '';
            document.getElementById('gender').value = '';
            document.getElementById('entryWeight').value = '';
            document.getElementById('hitStatus').textContent = '';
            document.getElementById('hitStatus').className = 'hit-status';
            updateAnimalSelect();
        }

        // View entered animals
        function viewEnteredAnimals() {
            const table = document.createElement('table');
            table.innerHTML = '<thead><tr><th>Ohrmarke</th><th>Rasse</th><th>Geschlecht</th><th>Eingangsgewicht</th><th>Eingangsdatum</th></tr></thead><tbody>';

            animals.forEach(animal => {
                const row = table.insertRow();
                row.innerHTML = `
                    <td>${animal.earTag}</td>
                    <td>${animal.breed}</td>
                    <td>${animal.gender === 'm' ? 'Männlich' : 'Weiblich'}</td>
                    <td>${animal.entryWeight.toFixed(1)} kg</td>
                    <td>${new Date(animal.entryDate).toLocaleDateString('de-DE')}</td>
                `;
            });

            table.innerHTML += '</tbody>';
            alert('Erfasste Tiere:\n' + table.outerHTML);
        }

        // Update animal select dropdown
        function updateAnimalSelect() {
            const animalSelect = document.getElementById('animalSelect');
            animalSelect.innerHTML = '<option value="">-- Wählen --</option>';
            animals.forEach(animal => {
                const option = document.createElement('option');
                option.value = animal.id;
                option.textContent = `${animal.earTag} (${animal.breed})`;
                animalSelect.appendChild(option);
            });
        }

        // Record weight
        function recordWeight() {
            const animalId = document.getElementById('animalSelect').value;
            const weighDate = document.getElementById('weighDate').value;
            const weighEvent = document.getElementById('weighEvent').value;
            const weight = parseFloat(document.getElementById('weight').value);

            if (!animalId || !weighDate || !weighEvent || isNaN(weight)) {
                alert('Bitte füllen Sie alle Felder aus!');
                return;
            }

            const weightRecord = {
                id: Date.now(),
                animalId: animalId,
                date: weighDate,
                event: weighEvent,
                weight: weight,
                synced: false
            };

            weights.push(weightRecord);
            saveData();
            alert('Gewicht erfasst!');
            document.getElementById('animalSelect').value = '';
            document.getElementById('weighDate').value = '';
            document.getElementById('weighEvent').value = '';
            document.getElementById('weight').value = '';
        }

        // Record group weight
        function recordGroupWeight() {
            const groupAnimalsInput = document.getElementById('groupAnimals').value.trim();
            const groupWeight = parseFloat(document.getElementById('groupWeight').value);
            const groupDate = document.getElementById('groupDate').value;

            if (!groupAnimalsInput || isNaN(groupWeight) || !groupDate) {
                alert('Bitte füllen Sie alle Felder aus!');
                return;
            }

            const earTags = groupAnimalsInput.split(',').map(tag => tag.trim());
            const matchingAnimals = animals.filter(a => earTags.includes(a.earTag));

            if (matchingAnimals.length === 0) {
                alert('Keine Tiere mit den angegebenen Ohrmarken gefunden!');
                return;
            }

            const weightPerAnimal = groupWeight / matchingAnimals.length;

            matchingAnimals.forEach(animal => {
                const weightRecord = {
                    id: Date.now() + Math.random(),
                    animalId: animal.id,
                    date: groupDate,
                    event: 'Gruppengewicht',
                    weight: weightPerAnimal,
                    synced: false
                };
                weights.push(weightRecord);
            });

            saveData();
            alert(`Gruppengewicht für ${matchingAnimals.length} Tiere erfasst!`);
            document.getElementById('groupAnimals').value = '';
            document.getElementById('groupWeight').value = '';
            document.getElementById('groupDate').value = '';
        }

        // Load inventory from Google Sheets
        async function loadInventory() {
            if (!sheetUrl) {
                alert('Bitte konfigurieren Sie zunächst die Sheet-URL in den Einstellungen!');
                return;
            }

            try {
                // For simplicity, we'll use the CSV export of Google Sheets
                const csvUrl = sheetUrl.replace('/edit?usp=sharing', '/export?format=csv');
                const response = await fetch(csvUrl);
                const csv = await response.text();

                // Parse CSV
                const lines = csv.split('\n');
                const headers = lines[0].split(',');
                const inventoryTable = document.getElementById('inventoryTable');
                inventoryTable.innerHTML = '<table><thead><tr>';

                headers.forEach(header => {
                    inventoryTable.querySelector('tr').innerHTML += `<th>${header}</th>`;
                });

                inventoryTable.querySelector('table').innerHTML += '</thead><tbody>';
                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim()) {
                        const values = lines[i].split(',');
                        inventoryTable.querySelector('tbody').innerHTML += '<tr>';
                        values.forEach(value => {
                            inventoryTable.querySelector('tbody tr:last-child').innerHTML += `<td>${value}</td>`;
                        });
                        inventoryTable.querySelector('tbody').innerHTML += '</tr>';
                    }
                }

                inventoryTable.querySelector('table').innerHTML += '</tbody></table>';
            } catch (error) {
                alert('Fehler beim Laden des Bestands: ' + error.message);
            }
        }

        // Settings modal
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');

        settingsBtn.addEventListener('click', () => {
            document.getElementById('sheetUrl').value = sheetUrl;
            document.getElementById('appsScriptUrl').value = appsScriptUrl;
            settingsModal.style.display = 'block';
        });

        closeSettings.addEventListener('click', () => {
            settingsModal.style.display = 'none';
        });

        window.addEventListener('click', (event) => {
            if (event.target === settingsModal) {
                settingsModal.style.display = 'none';
            }
        });

        // Save sheet URL
        document.getElementById('saveSheetBtn').addEventListener('click', () => {
            sheetUrl = document.getElementById('sheetUrl').value;
            saveSettings();
            alert('Sheet-URL gespeichert!');
        });

        // Save apps script URL
        document.getElementById('saveAppsScriptBtn').addEventListener('click', () => {
            appsScriptUrl = document.getElementById('appsScriptUrl').value;
            saveSettings();
            alert('Apps Script URL gespeichert!');
        });

        // Add breed
        document.getElementById('addBreedBtn').addEventListener('click', addBreed);

        // HI-TIER auto-lookup when leaving the Ohrmarke field
        document.getElementById('earTag').addEventListener('change', hitLookupByEarTag);

        // Tab switching
        const navButtons = document.querySelectorAll('.nav-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        navButtons.forEach(button => {
            button.addEventListener('click', () => {
                navButtons.forEach(btn => btn.classList.remove('active'));
                tabContents.forEach(tab => tab.classList.remove('active'));

                button.classList.add('active');
                const tabId = button.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Button event listeners
        document.getElementById('addAnimalBtn').addEventListener('click', addAnimal);
        document.getElementById('viewEnteredAnimalsBtn').addEventListener('click', viewEnteredAnimals);
        document.getElementById('recordWeightBtn').addEventListener('click', recordWeight);
        document.getElementById('recordGroupWeightBtn').addEventListener('click', recordGroupWeight);
        document.getElementById('loadInventoryBtn').addEventListener('click', loadInventory);

        // Initialize date inputs to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('weighDate').value = today;
        document.getElementById('groupDate').value = today;

        // Initialize app
        loadData();
        initBreeds();
        updateAnimalSelect();
        updateSyncStatus();
    </script>
</body>
</html>
